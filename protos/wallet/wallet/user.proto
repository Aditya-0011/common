syntax = "proto3";

package wallet;

import "google/protobuf/timestamp.proto";
import "google/type/decimal.proto";
import "wallet/common.proto";

option csharp_namespace = "Wallet";
option go_package = "github.com/Aditya-0011/common/contracts/go/wallet;wallet";

message GetUserSummaryResponse {
  google.type.Decimal all_income = 1;
  google.type.Decimal all_expense = 2;
  google.type.Decimal month_income = 3;
  google.type.Decimal month_expense = 4;
  google.type.Decimal week_income = 5;
  google.type.Decimal week_expense = 6;
  google.protobuf.Timestamp start_date = 7;
}

service UserService {
  rpc GetUserSummary(SimpleRequest) returns (GetUserSummaryResponse);
}
