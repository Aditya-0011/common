syntax = "proto3";

package auth;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/Aditya-0011/common/contracts/go/auth;auth";

message LoginRequest {
  string email = 1 [
    (buf.validate.field).string.email = true,
    (buf.validate.field).string.max_len = 100
  ];
  string password = 2 [
    (buf.validate.field).string.min_len = 8,
    (buf.validate.field).string.max_len = 100
  ];
}

message LoginResponse {
  int32 user_id = 1;
  string user_email = 2;
}

message KeyRequest {
  int32 user_id = 1 [(buf.validate.field).int32.gt = 0];
}

message GetKeyResponse {
  string key = 1;
  google.protobuf.Timestamp updated_at = 2;
}

message ValidateKeyRequest {
  string key = 1;
}

message SimpleResponse {
  string message = 1;
}

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RotateKey(KeyRequest) returns (SimpleResponse);
  rpc GetKey(KeyRequest) returns (GetKeyResponse);
  rpc ValidateKey(ValidateKeyRequest) returns (LoginResponse);
}
