name: Generate Protobuf Contracts

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write 
      packages: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Buf Checks
        uses: bufbuild/buf-action@v1
        with:
          input: protos
          push: false
          format: false 

      - name: Generate Go Code
        run: buf generate protos --template protos/buf.gen.yaml
        
      - name: Update Go dependencies
        working-directory: contracts/go
        run: |
          go mod tidy

      - name: Generate C# Code
        run: buf generate protos/wallet --template protos/buf.gen.csharp.yaml

      - name: Pack and Publish C# NuGet Package
        working-directory: contracts/csharp
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet pack -c Release
          dotnet nuget push bin/Release/*.nupkg --source github --skip-duplicate

      - name: Auto-commit Generated Code to PR
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: auto-generate protobuf contracts"
          file_pattern: "contracts/"